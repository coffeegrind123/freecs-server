set hostname "FreeCS Server"
set maxplayers 16
set maxclients 16

set g_gametype counterstrike
set sv_public 1
set sv_master1 "ms.cs16.net:27950"
set com_protocolname "FTE-Quake"
set sv_port 27500

set mp_startmoney 800
set mp_freezetime 3
set mp_roundtime 2.5
set mp_timelimit 30
set mp_winlimit 0
set mp_halftime 0
set mp_flashlight 1
set mp_allowvote 1

set sv_friendlyFire 0

set fcs_maxmoney 16000
set fcs_reward_kill 300

set bot_enable 1
set bot_minClients 4

// Mapcycle: manually set since Nuclide FileExists fails for maps inside pk3s
alias m0 "map de_dust2;alias nextmap m1"
alias m1 "map de_inferno;alias nextmap m2"
alias m2 "map de_nuke;alias nextmap m3"
alias m3 "map cs_office;alias nextmap m4"
alias m4 "map de_aztec;alias nextmap m5"
alias m5 "map cs_italy;alias nextmap m6"
alias m6 "map de_cbble;alias nextmap m7"
alias m7 "map de_dust;alias nextmap m8"
alias m8 "map de_train;alias nextmap m9"
alias m9 "map cs_assault;alias nextmap m0"
alias nextmap m1
